<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>501 Darts Scoreboard</title>
<!-- Created by Mark Livera 2025 -->
<link rel="icon" type="image/png" href="favicon.png">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

<style>

body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #333;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    width: 95vw;
    height: 95vh;
    background: #333;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
    gap: 40px;
    position: relative;
}

.player-column {
    flex: 1;
    max-width: 50%;
    height: 100%;
    display: flex;
    flex-direction: column;
    padding: 10px;
    background: #0a0066;
    color: gold;
    border-radius: 10px;
    overflow-y: auto;
    box-sizing: border-box;
}

.player-column h2 {
    margin-top: 0;
    text-align: center;
    font-size: 2em;
}

.player-input {
    margin-bottom: 10px;
    text-align: center;
}

input[type="text"], input[type="number"] {
    padding: 5px;
    margin: 5px 0;
    text-align: center;
}

input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
}

input[type=number] {
    -moz-appearance: textfield;
}

button {
    padding: 5px 10px;
    margin: 5px;
    cursor: pointer;
    border-radius: 10px;
    border: none;
    color: #171b05;
}

button.add-score {
    background-color: #28a745;
}

button.undo-score {
    background-color: #fd7e14;
}

button.reset-game {
    background-color: #007bff;
}

.dartboard {
    width: 120px;
    position: absolute;
    top: 2%;
    left: 50%;
    transform: translateX(-50%);
}

.history-table {
    width: 100%;
    margin-top: 10px;
    border-collapse: collapse;
}

.history-table th, .history-table td {
    border: 1px solid gold;
    padding: 5px;
    text-align: center;
}

.history-table th {
    color: gold;
}


.turn-indicator {
    display: inline-block;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: transparent;
    margin-right: 8px;
}

.turn-indicator.active {
    background: rgb(41, 182, 41);
}

.score-inputs {
    display: flex;
    align-items: center;
    gap: 5px;
}

#player1-score {
    flex-direction: row-reverse;
    justify-content: flex-start;
}

#player2-score {
    flex-direction: row;
    justify-content: flex-end;
}

.score-buttons {
    display: flex;
    gap: 5px;
}
</style>
</head>
<body>

<div class="container">

    <div class="player-column" id="player1-column">
        <h2><span class="turn-indicator" id="turn1"></span> <span id="player1-name">Player 1</span></h2>
        <div class="player-input">
            <input type="text" id="player1" placeholder="Enter Name">
            <button onclick="setNames()">Set Name</button>
        </div>
        <div class="score-inputs" id="player1-score">
            <div class="score-buttons">
                <button class="undo-score" onclick="undoLast(0)">Undo Last Score</button>
                <button class="add-score" onclick="addScore(0)">Add Score</button>
                <button class="reset-game" onclick="resetGame()">Reset Game</button>
            </div>
            <input type="number" id="scoreInput1" min="0" max="180" placeholder="Score">
        </div>
        <table class="history-table">
            <thead>
                <tr>
                    <th>End Score</th>
                    <th>Remaining</th>
                    <th>Finish</th>
                </tr>
            </thead>
            <tbody id="history1"></tbody>
        </table>
    </div>

    <img src="dartboard.png" alt="Dartboard" class="dartboard">

    <div class="player-column" id="player2-column">
        <h2><span class="turn-indicator" id="turn2"></span> <span id="player2-name">Player 2</span></h2>
        <div class="player-input">
            <input type="text" id="player2" placeholder="Enter Name">
            <button onclick="setNames()">Set Name</button>
        </div>
        <div class="score-inputs" id="player2-score">
            <input type="number" id="scoreInput2" min="0" max="180" placeholder="Score">
            <div class="score-buttons">
    <button class="add-score" onclick="addScore(1)">Add Score</button>
    <button class="undo-score" onclick="undoLast(1)">Undo Last Score</button>
    <button id="exportCSV" class="reset-game">Export CSV</button>
    <button id="exportPDF" class="reset-game">Export PDF</button>
</div>
        </div>
        <table class="history-table">
            <thead>
                <tr>
                    <th>End Score</th>
                    <th>Remaining</th>
                    <th>Finish</th>
                </tr>
            </thead>
            <tbody id="history2"></tbody>
        </table>
    </div>
</div>

<script>
let scores = [501, 501];
let histories = [[], []];
let turnStartScore = [501, 501];
let prevScores = [[], []];
let currentPlayer = null;

function setNames() {
    const p1 = document.getElementById('player1').value.trim() || 'Player 1';
    const p2 = document.getElementById('player2').value.trim() || 'Player 2';
    document.getElementById('player1-name').textContent = p1;
    document.getElementById('player2-name').textContent = p2;
}

function highlightCurrentPlayer() {
    document.getElementById('turn1').classList.remove('active');
    document.getElementById('turn2').classList.remove('active');
    if(currentPlayer !== null) {
        document.getElementById(`turn${currentPlayer + 1}`).classList.add('active');
    }
}

function addScore(playerIndex) {
    const scoreInput = document.getElementById(`scoreInput${playerIndex + 1}`);
    const score = parseInt(scoreInput.value);

    if (isNaN(score) || score < 0 || score > 180) {
        alert("Invalid score");
        return;
    }

    if (currentPlayer === null) currentPlayer = playerIndex;
    if (playerIndex !== currentPlayer) {
        alert("It's not your turn!");
        return;
    }

    prevScores[playerIndex].push(scores[playerIndex]);
    let newScore = scores[playerIndex] - score;

    if (newScore < 0 || newScore === 1 || (newScore === 0 && score % 2 !== 0)) {
        alert(`${document.getElementById(`player${playerIndex + 1}-name`).textContent} busted!`);
        histories[playerIndex].push("BUST");
        newScore = turnStartScore[playerIndex];
    } else {
        histories[playerIndex].push(score);
    }

    scores[playerIndex] = newScore;
    turnStartScore[playerIndex] = newScore;
    updateHistory(playerIndex);
    scoreInput.value = '';

    if (newScore === 0) {
        alert(`${document.getElementById(`player${playerIndex + 1}-name`).textContent} wins the leg!`);
        currentPlayer = null;
        highlightCurrentPlayer();
        return;
    }

    currentPlayer = 1 - currentPlayer;
    highlightCurrentPlayer();
}

function undoLast(playerIndex) {
    if(prevScores[playerIndex].length === 0 || histories[playerIndex].length === 0) {
        alert("Nothing to undo!");
        return;
    }
    scores[playerIndex] = prevScores[playerIndex].pop();
    turnStartScore[playerIndex] = scores[playerIndex];
    histories[playerIndex].pop();
    currentPlayer = playerIndex;
    highlightCurrentPlayer();
    updateHistory(playerIndex);
}

function resetGame() {
    scores = [501, 501];
    histories = [[], []];
    prevScores = [[], []];
    turnStartScore = [501, 501];
    currentPlayer = null;
    updateHistory(0);
    updateHistory(1);
    highlightCurrentPlayer();
    document.getElementById('scoreInput1').value = '';
    document.getElementById('scoreInput2').value = '';
}

function updateHistory(playerIndex) {
    const tbody = document.getElementById(`history${playerIndex+1}`);
    tbody.innerHTML = '';
    histories[playerIndex].forEach((val) => {
        const row = document.createElement('tr');
        row.innerHTML = `<td>${val}</td><td>${scores[playerIndex]}</td><td>${suggestFinish(scores[playerIndex])}</td>`;
        if(val === "BUST") row.style.color = 'red';
        tbody.appendChild(row);
    });
}

function suggestFinish(score) {
    if(score < 2) return '';
    const finishes = {
        170:"T20 T20 Bull", 167:"T20 T19 Bull", 164:"T20 T18 Bull", 161:"T20 T17 Bull",
        160:"T20 T20 D20", 158:"T20 T20 D19", 157:"T20 T19 D20", 156:"T20 T20 D18",
        155:"T20 T19 D19", 154:"T20 T18 D20", 153:"T20 T19 D18", 152:"T20 T20 D16",
        151:"T20 T17 D20", 150:"T20 T18 D18", 149:"T20 T19 D16", 148:"T20 T16 D20",
        147:"T20 T17 D18", 146:"T20 T18 D16", 145:"T20 T15 D20", 144:"T20 T20 D12",
        143:"T20 T17 D16", 142:"T20 T14 D20", 141:"T20 T19 D12", 140:"T20 T20 D10",
        139:"T20 T13 D20", 138:"T20 T18 D12", 137:"T20 T19 D10", 136:"T20 T20 D8",
        135:"T20 T17 D12", 134:"T20 T14 D16", 133:"T20 T19 D8", 132:"T20 T16 D12",
        131:"T20 T13 D16", 130:"T20 T20 D5", 129:"T19 T16 D12", 128:"T18 T14 D16",
        127:"T20 T17 D8", 126:"T19 T19 D6", 125:"T20 T15 D10", 124:"T20 T12 D16",
        123:"T19 T16 D9", 122:"T18 T18 D7", 121:"T20 T11 D14", 120:"T20 20 D20",
        119:"T19 10 D20", 118:"T20 18 D20", 117:"T20 17 D20", 116:"T20 16 D20",
        115:"T20 15 D20", 114:"T20 14 D20", 113:"T20 13 D20", 112:"T20 12 D20",
        111:"T20 11 D20", 110:"T20 10 D20", 109:"T20 9 D20", 108:"T20 8 D20",
        107:"T20 7 D20", 106:"T20 6 D20", 105:"T20 5 D20", 104:"T18 18 D16",
        103:"T19 10 D20", 102:"T20 10 D16", 101:"T17 10 D20", 100:"T20 D20",
        99:"T19 10 D16", 98:"T20 D19", 97:"T19 D20", 96:"T20 D18", 95:"T19 D19",
        94:"T18 D20", 93:"T19 D18", 92:"T20 D16", 91:"T17 D20", 90:"T18 D18",
        89:"T19 D16", 88:"T16 D20", 87:"T17 D18", 86:"T18 D16", 85:"T15 D20",
        84:"T20 D12", 83:"T17 D16", 82:"T14 D20", 81:"T19 D12", 80:"T20 D10",
        79:"T13 D20", 78:"T18 D12", 77:"T19 D10", 76:"T20 D8", 75:"T17 D12",
        74:"T14 D16", 73:"T19 D8", 72:"T16 D12", 71:"T13 D16", 70:"T18 D8",
        69:"T19 D6", 68:"T20 D4", 67:"T17 D8", 66:"T10 D18", 65:"T19 D4",
        64:"T16 D8", 63:"T13 D12", 62:"T10 D16", 61:"T15 D8", 60:"20 D20",
        59:"19 D20", 58:"18 D20", 57:"17 D20", 56:"16 D20", 55:"15 D20",
        54:"14 D20", 53:"13 D20", 52:"12 D20", 51:"11 D20", 50:"10 D20",
        40:"D20", 32:"D16", 24:"D12", 16:"D8", 8:"D4", 2:"D1"
    };
    return finishes[score] || '';
}

const scoreInputs = [document.getElementById('scoreInput1'), document.getElementById('scoreInput2')];
scoreInputs.forEach(input => {
    input.addEventListener('input', function() {
        this.value = this.value.replace(/[^\d]/g, '');
    });
    input.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            const index = input.id === 'scoreInput1' ? 0 : 1;
            addScore(index);
        }
    });
});

highlightCurrentPlayer();
function exportCSV() {
  const rows = [];
  const headers = ["Player", "End", "Score", "Remaining"];
  rows.push(headers);

  document.querySelectorAll(".history-table tbody").forEach((tableBody, i) => {
    const playerName = document.getElementById(`player${i + 1}-name`).textContent;
    tableBody.querySelectorAll("tr").forEach(tr => {
      const cols = Array.from(tr.querySelectorAll("td")).map(td => td.textContent);
      rows.push([playerName, ...cols]);
    });
  });

  const csvContent = rows.map(r => r.join(",")).join("\n");
  const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "dart_game_results.csv";
  link.click();
}

function exportPDF() {
  const doc = new jspdf.jsPDF();
  let yPos = 20;
  doc.setFontSize(16);
  doc.text("Dart Game Results", 14, yPos);
  yPos += 10;

  document.querySelectorAll(".history-table tbody").forEach((tableBody, i) => {
    const playerName = document.getElementById(`player${i + 1}-name`).textContent;
    const tableData = [];
    tableBody.querySelectorAll("tr").forEach(tr => {
      const cols = Array.from(tr.querySelectorAll("td")).map(td => td.textContent);
      tableData.push(cols);
    });
    doc.text(playerName, 14, yPos);
    yPos += 4;
    doc.autoTable({
      startY: yPos,
      head: [["End Score", "Remaining", "Finish"]],
      body: tableData,
      theme: "grid",
    });
    yPos = doc.lastAutoTable.finalY + 10;
  });

  doc.save("dart_game_results.pdf");
}

document.getElementById("exportCSV").addEventListener("click", exportCSV);
document.getElementById("exportPDF").addEventListener("click", exportPDF);

</script>

</body>
</html>
