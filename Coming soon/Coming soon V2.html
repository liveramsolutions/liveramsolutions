<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coming Soon</title>

<!-- Created by Mark L -->

<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family:"Segoe UI", Tahoma, Geneva, Verdana, sans-serif; }

  body {
    height:100vh;
    background: radial-gradient(circle at 20% 20%, #0f172a, #020617);
    color:#e2e8f0;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
  }

  /* animated grid */
  body::before {
    content:"";
    position:absolute;
    width:200%; height:200%;
    background-image:
      linear-gradient(rgba(56,189,248,0.08) 1px, transparent 1px),
      linear-gradient(90deg, rgba(56,189,248,0.08) 1px, transparent 1px);
    background-size:40px 40px;
    transform:rotate(15deg);
    animation:moveGrid 20s linear infinite;
  }

  @keyframes moveGrid {
    0% { transform:translate(0,0) rotate(15deg); }
    100% { transform:translate(-40px,-40px) rotate(15deg); }
  }

  .container {
    position:relative;
    text-align:center;
    padding:70px;
    width:50vw;
    background:rgba(15,23,42,0.65);
    border:1px solid rgba(56,189,248,0.25);
    border-radius:20px;
    backdrop-filter:blur(12px);
    box-shadow:0 0 60px rgba(56,189,248,0.15);
  }

  h1 { font-size:4rem; letter-spacing:3px; margin-bottom:15px; color:#38bdf8; }

  .signature {
    font-size:1rem;
    margin-bottom:40px;
    font-weight:600;
    letter-spacing:1.5px;
    background:linear-gradient(90deg,#d4af37,#ffd700,#f5d76e,#d4af37);
    background-size:200% auto;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    text-shadow:0 0 10px rgba(212,175,55,0.4);
    animation:goldFlow 4s linear infinite;
  }

  @keyframes goldFlow {
    0% { background-position:0% center; }
    100% { background-position:200% center; }
  }

  /* countdown */
  .countdown {
    display:flex;
    justify-content:center;
    gap:25px;
    margin:30px 0 40px;
  }

  .time-box {
    background:rgba(2,6,23,0.8);
    border:1px solid rgba(56,189,248,0.2);
    border-radius:12px;
    padding:15px 20px;
    min-width:80px;
  }

  .time-box span {
    display:block;
    font-size:2rem;
    color:#38bdf8;
  }

  .time-box small {
    font-size:0.7rem;
    color:#64748b;
    letter-spacing:1px;
  }

  p { font-size:1.4rem; margin-bottom:30px; color:#94a3b8; }

  footer { margin-top:40px; font-size:0.9rem; color:#475569; }

  /* floating nodes */
  .node {
    position:absolute;
    width:6px; height:6px;
    background:#38bdf8;
    border-radius:50%;
    opacity:0.6;
    animation:float 6s infinite ease-in-out;
  }

  .node:nth-child(1){ top:10%; left:15%; animation-delay:0s; }
  .node:nth-child(2){ top:80%; left:20%; animation-delay:1s; }
  .node:nth-child(3){ top:30%; right:15%; animation-delay:2s; }
  .node:nth-child(4){ bottom:15%; right:25%; animation-delay:3s; }

  @keyframes float {
    0%,100% { transform:translateY(0); }
    50% { transform:translateY(-15px); }
  }

  @media (max-width:900px) {
    .container { width:85vw; padding:40px; }
    h1 { font-size:2.8rem; }
  }
</style>
</head>

<body>

<div class="node"></div>
<div class="node"></div>
<div class="node"></div>
<div class="node"></div>

<div class="container">
  <h1>Coming Soon</h1>
  <div class="signature">LiveramSolutions</div>

  <p>Building something smarter, faster, and better.</p>

  <div class="countdown">
    <div class="time-box"><span id="days">00</span><small>DAYS</small></div>
    <div class="time-box"><span id="hours">00</span><small>HOURS</small></div>
    <div class="time-box"><span id="minutes">00</span><small>MIN</small></div>
    <div class="time-box"><span id="seconds">00</span><small>SEC</small></div>
  </div>

  <footer>© 2026 LiveramSolutions. All rights reserved.</footer>
</div>

<script>
  const targetDate = new Date();
  targetDate.setDate(targetDate.getDate() + 10); // default 10 days

  function updateCountdown() {
    const now = new Date().getTime();
    const distance = targetDate - now;

    const d = Math.floor(distance / (1000*60*60*24));
    const h = Math.floor((distance % (1000*60*60*24)) / (1000*60*60));
    const m = Math.floor((distance % (1000*60*60)) / (1000*60));
    const s = Math.floor((distance % (1000*60)) / 1000);

    document.getElementById("days").textContent = String(d).padStart(2,'0');
    document.getElementById("hours").textContent = String(h).padStart(2,'0');
    document.getElementById("minutes").textContent = String(m).padStart(2,'0');
    document.getElementById("seconds").textContent = String(s).padStart(2,'0');
  }

  setInterval(updateCountdown, 1000);
  updateCountdown();
</script>

</body>
</html>
