<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vent & Vanish | Write it and let it go!</title>
    <!-- Created By Mark Livera 2026 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; font-family: 'Inter', sans-serif; overflow: hidden; }
        
        #particle-canvas {
            position: fixed;
            top: 0; left: 0;
            pointer-events: none;
            z-index: 50;
        }

        .fade-out-fancy {
            animation: shatter-fade 3s ease-out forwards;
            pointer-events: none;
        }

        @keyframes shatter-fade {
            0% { opacity: 1; filter: blur(0px); transform: scale(1); }
            30% { filter: blur(4px); transform: scale(1.02); }
            100% { opacity: 0; filter: blur(30px); transform: scale(1.1) translateY(-20px); }
        }
    </style>
</head>
<body class="text-slate-200 min-h-screen flex flex-col items-center justify-center p-4">
    
    <canvas id="particle-canvas"></canvas>

    <main class="w-full max-w-2xl bg-slate-800/40 backdrop-blur-xl p-6 md:p-12 rounded-[2rem] border border-slate-700/50 flex flex-col gap-6 shadow-2xl relative">
        
        <header class="text-center">
            <h1 class="text-3xl md:text-4xl font-light text-white mb-2 tracking-tight">Vent & Vanish</h1>
            <p class="text-indigo-400 text-xs uppercase tracking-widest mb-2">Write it and let it go!</p>
            <p class="text-slate-400 text-sm md:text-base">Type your stress, get is out of your system, then release it into the void.</p>
        </header>

        <!-- Container for Textarea and Centered Message -->
        <div class="relative flex items-center justify-center">
            <textarea id="vent-input" 
                class="w-full h-64 md:h-80 bg-slate-900/50 border-2 border-slate-700 rounded-2xl p-5 text-lg focus:outline-none focus:border-indigo-500/50 transition-all resize-none placeholder-slate-600 shadow-inner" 
                placeholder="What's on your mind? No one will ever see this..."></textarea>
            
            <!-- NEW: Centered Success Message -->
            <div id="status-msg" class="absolute pointer-events-none opacity-0 transition-all duration-1000 text-center scale-90">
                <p class="text-xl md:text-2xl text-indigo-300 font-light italic">
                    It's gone. Take a deep breath and relax. 😊
                </p>
            </div>
        </div>

        <div class="flex flex-col items-center gap-4">
            <button onclick="vanishText()" id="vanish-btn" 
                class="w-full md:w-auto bg-indigo-600 hover:bg-indigo-500 text-white px-12 py-4 rounded-full font-semibold transition-all active:scale-95 shadow-lg shadow-indigo-500/20 text-lg">
                Release to the Void
            </button>
        </div>
    </main>

    <footer class="mt-10 text-center text-slate-500 text-xs space-y-3">
        <div class="flex items-center justify-center gap-2">
            <span class="h-px w-8 bg-slate-800"></span>
            <span class="bg-indigo-500/10 text-indigo-400 px-3 py-1 rounded-full border border-indigo-500/20 font-medium">
                🛡️ 100% Private & Stateless
            </span>
            <span class="h-px w-8 bg-slate-800"></span>
        </div>
        <p>This tool runs entirely in your browser. No data is ever sent to a server.</p>
    </footer>

    <script>
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 2 + 1;
                this.speedX = Math.random() * 2 - 1;
                this.speedY = Math.random() * -2 - 0.5; 
                this.opacity = 1;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.opacity -= 0.007;
            }
            draw() {
                ctx.fillStyle = `rgba(129, 140, 248, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, i) => {
                p.update();
                p.draw();
                if (p.opacity <= 0) particles.splice(i, 1);
            });
            requestAnimationFrame(animate);
        }
        animate();

        function vanishText() {
            const input = document.getElementById('vent-input');
            const btn = document.getElementById('vanish-btn');
            const msg = document.getElementById('status-msg');
            
            if (!input.value.trim()) return;

            const rect = input.getBoundingClientRect();
            for(let i=0; i<150; i++) {
                particles.push(new Particle(
                    rect.left + Math.random() * rect.width,
                    rect.top + Math.random() * rect.height
                ));
            }

            input.classList.add('fade-out-fancy');
            btn.disabled = true;
            btn.classList.add('opacity-0', 'pointer-events-none');

            setTimeout(() => {
                input.value = "";
                input.classList.remove('fade-out-fancy');
                
                // Show confirmation in the middle
                msg.classList.remove('opacity-0', 'scale-90');
                msg.classList.add('opacity-100', 'scale-100');

                setTimeout(() => { 
                    msg.classList.remove('opacity-100', 'scale-100');
                    msg.classList.add('opacity-0', 'scale-90');
                    
                    setTimeout(() => {
                        btn.disabled = false;
                        btn.classList.remove('opacity-0', 'pointer-events-none');
                    }, 500);
                }, 5000);
            }, 3000);
        }
    </script>
</body>
</html>
