<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scrabble Scoreboard</title>
<!-- Created by Mark Livera 2025 -->
<style>
  body {
    margin: 0;
    background-color: #363838;
    font-family: Arial, sans-serif;
    color: white;
    display: flex;
    justify-content: center;
  }

 .container {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  padding-top: 5vh;
  gap: 1rem;
  width: 90%;
  min-height: 90vh;
  align-items: stretch;
}

@media (max-width: 1200px) {
  .container {
    grid-template-columns: repeat(2, 1fr);
  }
}

@media (max-width: 700px) {
  .container {
    grid-template-columns: 1fr;
  }
}


  .player {
    background-color: #003366;
    border-radius: 15px;
    padding: 1rem;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    flex: 1;
  }

  .name-input {
    margin-bottom: 0.5rem;
    padding: 0.3rem;
    border-radius: 5px;
    border: none;
    text-align: center;
    font-size: 1rem;
  }

  .name-row {
    display: flex;
    justify-content: center;
    align-items: center;
    margin-bottom: 1rem;
    gap: 0.5rem;
  }

  .scrabble-name {
    display: flex;
  }

 .player-name {
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 1vw;
  }
  
  .rank {
    font-size: clamp(0.9rem, 1.2vw, 1.2rem);
    font-weight: bold;
    color: gold;
    margin-right: 0.5em;
}

 .tile {
    background: #f5e5c7;
    border: 0.25em solid #bea779;
    border-radius: 0.6em;
    margin: 0.3em;
    width: 4.5vw;
    height: 4.5vw;
    min-width: 35px;
    min-height: 35px;
    max-width: 60px;
    max-height: 60px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: bold;
    font-size: clamp(0.7rem, 1.2vw, 1.2rem);
    color: #000;
    box-shadow: 0.3em 0.3em 0.5em rgba(0,0,0,0.5);
    position: relative;
}

.tile-value {
    position: absolute;
    bottom: 0.2em;
    right: 0.3em;
    font-size: clamp(0.5rem, 0.7vw, 0.8rem);
    font-weight: bold;
}

  .score {
    font-size: clamp(1rem, 1.5vw, 1.5rem);
    margin-bottom: 0.5rem;
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.3em;
}

  .score-input {
    margin-top: 0.5rem;
    display: flex;
    gap: 0.3rem;
    justify-content: center;
  }

  .score-input input {
    width: 60px;
    padding: 0.3rem;
    border-radius: 5px;
    border: none;
    text-align: center;
    font-size: 1rem;
  }

  .score-input button {
    padding: 0.3rem 0.6rem;
    border: none;
    border-radius: 5px;
    background: #f5deb3;
    cursor: pointer;
    font-weight: bold;
  }

  .turns {
    margin-top: 1rem;
    width: 100%;
    border-collapse: collapse;
  }

  .turns th, .turns td {
    border-bottom: 1px solid #666;
    padding: 0.2rem;
    text-align: center;
  }
</style>
</head>
<body>
<div class="container">
  <!-- 4 player panels -->
  <div class="player">
    <input type="text" class="name-input" placeholder="Enter name">
    <div class="player-name">
      <div class="scrabble-name"></div>
      <div class="rank"></div>
  </div>
    <div class="score">Score: 0</div>
    <div class="score-input">
      <input type="number" class="add-score" placeholder="Score">
      <button class="add-btn">Add</button>
      <button class="remove-btn">Undo</button>
    </div>
    <table class="turns">
      <thead><tr><th>Turn</th><th>Points</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>

  <div class="player">
    <input type="text" class="name-input" placeholder="Enter name">
    <div class="player-name">
      <div class="scrabble-name"></div>
      <div class="rank"></div>
    </div>
    <div class="score">Score: 0</div>
    <div class="score-input">
      <input type="number" class="add-score" placeholder="Score">
      <button class="add-btn">Add</button>
      <button class="remove-btn">Undo</button>
    </div>
    <table class="turns">
      <thead><tr><th>Turn</th><th>Points</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>

  <div class="player">
    <input type="text" class="name-input" placeholder="Enter name">
    <div class="player-name">
      <div class="scrabble-name"></div>
      <div class="rank"></div>
    </div>
    <div class="score">Score: 0</div>
    <div class="score-input">
      <input type="number" class="add-score" placeholder="Score">
      <button class="add-btn">Add</button>
      <button class="remove-btn">Undo</button>
    </div>
    <table class="turns">
      <thead><tr><th>Turn</th><th>Points</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>

  <div class="player">
    <input type="text" class="name-input" placeholder="Enter name">
    <div class="player-name">
      <div class="scrabble-name"></div>
      <div class="rank"></div>
    </div>
    <div class="score">Score: 0</div>
    <div class="score-input">
      <input type="number" class="add-score" placeholder="Score">
      <button class="add-btn">Add</button>
      <button class="remove-btn">Undo</button>
    </div>
    <table class="turns">
      <thead><tr><th>Turn</th><th>Points</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<script>
const players = [];

document.querySelectorAll(".player").forEach((player, index) => {
  const nameInput = player.querySelector(".name-input");
  const scrabbleName = player.querySelector(".scrabble-name");
  const rankDisplay = player.querySelector(".rank");
  const scoreDisplay = player.querySelector(".score");
  const scoreInput = player.querySelector(".add-score");
  const addButton = player.querySelector(".add-btn");
  const removeButton = player.querySelector(".remove-btn");
  const turnsBody = player.querySelector(".turns tbody");

  let totalScore = 0;
  let turn = 0;
  const turns = [];

  players.push({ index, get score() { return totalScore; }, rankDisplay });

  function renderName() {
    scrabbleName.innerHTML = "";
    const values = {A:1,B:3,C:3,D:2,E:1,F:4,G:2,H:4,I:1,J:8,K:5,L:1,M:3,N:1,O:1,P:3,Q:10,R:1,S:1,T:1,U:1,V:4,W:4,X:8,Y:4,Z:10};
    [...nameInput.value.toUpperCase()].forEach(letter => {
      const tile = document.createElement("div");
      tile.className = "tile";
      tile.textContent = letter;
      if (values[letter] !== undefined) {
        const val = document.createElement("span");
        val.className = "tile-value";
        val.textContent = values[letter];
        tile.appendChild(val);
      }
      scrabbleName.appendChild(tile);
    });
    nameInput.style.display = "none";
  }

  function updateRanks() {
    const sorted = [...players].sort((a, b) => b.score - a.score);
    sorted.forEach((p, i) => {
      p.rankDisplay.textContent = p.score > 0 ? `#${i+1}` : "";
    });
  }

  function addScore() {
    const val = parseInt(scoreInput.value);
    if (!isNaN(val)) {
      turn++;
      totalScore += val;
      turns.push(val);
      scoreDisplay.textContent = "Score: " + totalScore;
      const row = document.createElement("tr");
      row.innerHTML = `<td>${turn}</td><td>${val}</td>`;
      turnsBody.appendChild(row);
      scoreInput.value = "";
      updateRanks();
    }
  }

  function removeScore() {
    if (turns.length > 0) {
      const last = turns.pop();
      totalScore -= last;
      turn--;
      scoreDisplay.textContent = "Score: " + totalScore;
      turnsBody.removeChild(turnsBody.lastChild);
      updateRanks();
    }
  }

  nameInput.addEventListener("keydown", e => {
    if (e.key === "Enter" && nameInput.value.trim() !== "") {
      renderName();
    }
  });

  scoreInput.addEventListener("keydown", e => {
    if (e.key === "Enter") addScore();
  });

  addButton.addEventListener("click", addScore);
  removeButton.addEventListener("click", removeScore);
});
</script>
</body>
</html>
