<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cubic Weight Calculator</title>
    <!-- Created by Mark Livera 2026 -->
    <style>
        :root {
            --bg-color: #1e1e1e;
            --card-bg: #2d2d2d;
            --primary-blue: #4a90e2;
            --accent-gold: #ffd700;
            --subtle-gold: #5c4d00;
            --highlight-purple: #9b51e0;
            --text-white: #f5f5f5;
            --border-color: #3d3d3d;
            --danger-red: #ff4d4d;
            --success-green: #2ecc71;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-white);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
        }

        .calculator-card {
            background: var(--card-bg);
            width: 100%;
            max-width: 500px;
            padding: 25px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            border: 1px solid var(--border-color);
        }

        h2 {
            margin-top: 0;
            color: var(--primary-blue);
            text-align: center;
            font-weight: 800;
            font-size: 1.5rem;
            border-bottom: 3px solid var(--accent-gold);
            padding-bottom: 10px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .section-title {
            display: block;
            margin-bottom: 10px;
            font-size: 0.9rem;
            color: var(--primary-blue);
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-group { margin-bottom: 12px; position: relative; }
        label { display: block; margin-bottom: 3px; font-size: 0.8rem; color: #aaa; font-weight: bold; }

        input {
            width: 100%;
            padding: 10px 5px;
            background: #1a1a1a;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            text-align: center;
            appearance: textfield;
        }

        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

        .spin-btns {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 5px;
        }

        .spin-btn {
            background: rgba(155, 81, 224, 0.1);
            border: 1px solid var(--highlight-purple);
            color: var(--highlight-purple);
            border-radius: 4px;
            width: 30px;
            height: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.1rem;
            transition: all 0.2s;
        }
        .spin-btn:hover { background: var(--highlight-purple); color: white; }

        /* Results Column - Flexbox ensures they fill the height */
        .results-column {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .result-box {
            flex: 1; /* Makes cards grow to fill available height evenly */
            background: #252525;
            padding: 10px 12px;
            border-radius: 10px;
            border-left: 4px solid transparent;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .result-box.active { border-left-color: var(--accent-gold); background: #353535; }
        .result-label { font-size: 0.65rem; color: #888; text-transform: uppercase; font-weight: 700; }
        .result-value { display: block; font-size: 1.1rem; font-weight: bold; color: var(--highlight-purple); }

        .comparison {
            grid-column: span 2;
            text-align: center;
            padding: 12px;
            background: rgba(92, 77, 0, 0.15);
            border-radius: 12px;
            border: 1px solid var(--subtle-gold);
            margin-top: 5px;
        }

        .comp-title { color: var(--primary-blue); font-weight: 800; font-size: 1rem; display: block; }
        .comp-sub { color: #888; font-size: 0.8rem; font-weight: 600; }

        .actions { display: flex; gap: 10px; margin-top: 15px; grid-column: span 2; }
        
        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            text-transform: uppercase;
            color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn:hover { transform: translateY(-3px); }
        .btn-clear { background: var(--danger-red); }
        .btn-copy { background: var(--success-green); }

        @media (max-width: 400px) {
            .main-grid { grid-template-columns: 1fr; }
            .comparison, .actions { grid-column: span 1; }
        }
    </style>
</head>
<body>

    <div class="calculator-card">
        <h2>Cubic Weight</h2>
        
        <div class="main-grid">
            <!-- Left Side: Inputs -->
            <div class="inputs-column">
                <span class="section-title">Dimensions</span>
                <div class="input-group">
                    <label>Length (cm)</label>
                    <input type="number" id="L" placeholder="0" class="calc-input" inputmode="decimal">
                    <div class="spin-btns">
                        <div class="spin-btn" onclick="step('L', -1)">−</div>
                        <div class="spin-btn" onclick="step('L', 1)">+</div>
                    </div>
                </div>
                <div class="input-group">
                    <label>Width (cm)</label>
                    <input type="number" id="W" placeholder="0" class="calc-input" inputmode="decimal">
                    <div class="spin-btns">
                        <div class="spin-btn" onclick="step('W', -1)">−</div>
                        <div class="spin-btn" onclick="step('W', 1)">+</div>
                    </div>
                </div>
                <div class="input-group">
                    <label>Height (cm)</label>
                    <input type="number" id="H" placeholder="0" class="calc-input" inputmode="decimal">
                    <div class="spin-btns">
                        <div class="spin-btn" onclick="step('H', -1)">−</div>
                        <div class="spin-btn" onclick="step('H', 1)">+</div>
                    </div>
                </div>
                <div class="input-group">
                    <label>Actual (kg)</label>
                    <input type="number" id="actual" placeholder="0" class="calc-input" inputmode="decimal">
                    <div class="spin-btns">
                        <div class="spin-btn" onclick="step('actual', -1)">−</div>
                        <div class="spin-btn" onclick="step('actual', 1)">+</div>
                    </div>
                </div>
            </div>

            <!-- Right Side: Results -->
            <div class="results-column">
                <span class="section-title">Results</span>
                <div class="result-box" onclick="setActive(this, 167, 'Air')">
                    <span class="result-label">Air (167)</span>
                    <span id="air" class="result-value">-</span>
                </div>
                <div class="result-box active" onclick="setActive(this, 250, 'Road Exp')">
                    <span class="result-label">Road Exp (250)</span>
                    <span id="express" class="result-value">-</span>
                </div>
                <div class="result-box" onclick="setActive(this, 333, 'Road Gen')">
                    <span class="result-label">Road Gen (333)</span>
                    <span id="general" class="result-value">-</span>
                </div>
                <div class="result-box" onclick="setActive(this, 1000, 'LCL Sea')">
                    <span class="result-label">LCL Sea (1000)</span>
                    <span id="sea" class="result-value">-</span>
                </div>
            </div>

            <!-- Bottom Section -->
            <div class="comparison">
                <span class="comp-title" id="chargeable-text">Select a mode & enter data</span>
                <span class="comp-sub" id="volume-text"></span>
            </div>

            <div class="actions">
                <button class="btn btn-clear" onclick="clearAll()">Clear</button>
                <button class="btn btn-copy" onclick="copyResults()">Copy</button>
            </div>
        </div>
    </div>

    <script>
        const inputs = document.querySelectorAll('.calc-input');
        let currentFactor = 250;
        let currentLabel = 'Road Exp';

        function step(id, val) {
            const el = document.getElementById(id);
            el.value = Math.max(0, (parseFloat(el.value) || 0) + val);
            calculate();
        }

        inputs.forEach((input, index) => {
            input.addEventListener('input', calculate);
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    const nextInput = inputs[index + 1];
                    if (nextInput) nextInput.focus();
                    else { calculate(); input.blur(); }
                }
            });
        });

        function setActive(element, factor, label) {
            document.querySelectorAll('.result-box').forEach(box => box.classList.remove('active'));
            element.classList.add('active');
            currentFactor = factor;
            currentLabel = label;
            calculate();
        }

        function calculate() {
            const L = parseFloat(document.getElementById('L').value) || 0;
            const W = parseFloat(document.getElementById('W').value) || 0;
            const H = parseFloat(document.getElementById('H').value) || 0;
            const actual = parseFloat(document.getElementById('actual').value) || 0;

            if (L > 0 && W > 0 && H > 0) {
                const m3 = (L/100) * (W/100) * (H/100);
                document.getElementById('air').innerText = (m3 * 167).toFixed(2) + " kg";
                document.getElementById('express').innerText = (m3 * 250).toFixed(2) + " kg";
                document.getElementById('general').innerText = (m3 * 333).toFixed(2) + " kg";
                document.getElementById('sea').innerText = (m3 * 1000).toFixed(2) + " kg";

                const cubicForMode = m3 * currentFactor;
                const higher = Math.max(actual, cubicForMode);
                document.getElementById('chargeable-text').innerText = `Chargeable (${currentLabel}): ${higher.toFixed(2)} kg`;
                document.getElementById('volume-text').innerText = `Volume: ${m3.toFixed(3)} m³`;
            } else {
                resetResults();
            }
        }

        function resetResults() {
            ['air', 'express', 'general', 'sea'].forEach(id => document.getElementById(id).innerText = "-");
            document.getElementById('chargeable-text').innerText = "Select a mode & enter data";
            document.getElementById('volume-text').innerText = "";
        }

        function clearAll() {
            inputs.forEach(input => input.value = '');
            resetResults();
            document.getElementById('L').focus();
        }

        function copyResults() {
            const main = document.getElementById('chargeable-text').innerText;
            const vol = document.getElementById('volume-text').innerText;
            if (main.includes(':')) {
                navigator.clipboard.writeText(`${main} | ${vol}`).then(() => {
                    const btn = document.querySelector('.btn-copy');
                    const originalText = btn.innerText;
                    btn.innerText = "COPIED!";
                    setTimeout(() => btn.innerText = originalText, 2000);
                });
            }
        }
    </script>
</body>
</html>
